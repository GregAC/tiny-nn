# Simple CNN for testing the controller
# This is a minimal CNN with one of each layer type

[metadata]
name = "SimpleCNN"
description = "Simple test CNN for controller validation"
input_shape = [1, 8, 8]  # 1 channel, 8x8 image
output_size = 2

# First layer: 2x2 average pooling
[[layer]]
type = "avg_pool2d"
name = "pool1"
kernel_size = 2
stride = 2

# Second layer: 4x4 convolution with 2 output channels
[[layer]]
type = "conv2d"
name = "conv1"
in_channels = 1
out_channels = 2
kernel_size = 4
stride = 1
relu = false

[layer.weights]
source = "inline"
# 2 output channels * 1 input channel * 4 * 4 = 32 weights
values = [
     # Output channel 0
     -2.1511516079657502, -2.84762127725425,  -0.486812494365072,   3.573739797465757,
      2.8796050845681567, -2.1677717739025324, 1.1773551678118688, -3.4827525335969876,
     -2.574368897799234,   0.7489298426527116, 0.9621100245216283,  2.597275626945951,
      2.4674302376340727, -0.702734263349245, -2.9640080188302576, 4.928366816809005,

     # Output channel 1
     -2.5151712659812997, 0.024390384760835104, 0.02009650403887875, 2.040860487072159,
     -4.699952176677518,  3.546788110671864,    3.796024070055827,   2.474833999192608,
     -0.8387319757847163, 4.922792400058572,   -1.5483781054362233, -4.909310840754312,
     0.7396887511643371, -2.631437345615071,    4.496130942407152,  -2.528580660452775
]
#    # Output channel 0
#    0.1, 0.2, 0.3, 0.4,
#    0.1, 0.2, 0.3, 0.4,
#    0.1, 0.2, 0.3, 0.4,
#    0.1, 0.2, 0.3, 0.4,
#    # Output channel 1
#    -0.1, -0.2, -0.3, -0.4,
#    -0.1, -0.2, -0.3, -0.4,
#    -0.1, -0.2, -0.3, -0.4,
#    -0.1, -0.2, -0.3, -0.4
#]

[layer.bias]
source = "inline"
values = [0.0, 0.1]

# Third layer: flatten to vector
[[layer]]
type = "flatten"
name = "flatten1"

# Fourth layer: linear layer to 2 outputs
[[layer]]
type = "linear"
name = "fc1"
in_features = 2  # 2 channels * 1 * 1 = 2 (after conv reduces 4x4 to 1x1)
out_features = 2
relu = true

[layer.weights]
source = "inline"
# 2 outputs * 2 inputs = 4 weights
values = [0.5, 0.5, -0.5, 0.5]

[layer.bias]
source = "inline"
values = [0.0, 0.0]
